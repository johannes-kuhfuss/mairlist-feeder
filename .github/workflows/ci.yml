name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Prepare default export directory
        shell: pwsh
        run: New-Item -ItemType Directory -Force C:\TEMP | Out-Null
      - name: Check formatting
        shell: pwsh
        run: |
          $unformatted = gofmt -l .
          if ($unformatted) {
            Write-Error "Unformatted Go files:`n$unformatted"
            exit 1
          }
      - name: Vet
        run: go vet ./...
      - name: Test with race detector and coverage
        run: go test -race -cover ./...
